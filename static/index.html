<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley Odds Calculator - Фора по мячам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        input, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .url-input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        
        .team-list {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .team-list h4 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .team-item {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        
        .team-item:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }
        
        .team-item.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .team-name {
            font-weight: bold;
            font-size: 16px;
        }
        
        .team-stats {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .vs {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            color: #4CAF50;
        }
        
        .result {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-top: 25px;
        }
        
        .result-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        
        .result-header h2 {
            margin-bottom: 8px;
        }
        
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            font-size: 13px;
            opacity: 0.9;
        }
        
        .handicap-card {
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin: 20px 0;
        }
        
        .handicap-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        .handicap-line {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .handicap-odds {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .handicap-text {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 10px;
        }
        
        .odds-row {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        
        .odds-card {
            flex: 1;
            background: rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .odds-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .odds-value {
            font-size: 28px;
            font-weight: bold;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            display: none;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .help-text {
            font-size: 12px;
            color: #6c757d;
            margin-top: 8px;
        }
        
        .btn-reset {
            background: #6c757d;
            margin-top: 15px;
        }
        
        @media (max-width: 768px) {
            .teams-grid {
                grid-template-columns: 1fr;
            }
            .handicap-line {
                font-size: 20px;
            }
            .handicap-odds {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🏐 Volley Odds Calculator</h1>
            <div class="subtitle">Парсинг турнирных таблиц + фора по мячам</div>
            
            <!-- Ввод URL -->
            <div class="url-input-section">
                <input type="text" id="url-input" placeholder="Вставьте ссылку на турнирную таблицу">
                <button onclick="parseTable()">🔍 Парсить таблицу</button>
                <div class="help-text">
                    💡 Поддерживаются сайты с HTML-таблицами. Пример: DataProject, LegaVolley и др.
                </div>
                <div id="status" class="status"></div>
            </div>
            
            <!-- Выбор команд -->
            <div id="selection-section" style="display: none;">
                <div class="teams-grid">
                    <div>
                        <h4>🏠 ДОМАШНЯЯ КОМАНДА</h4>
                        <div id="home-list" class="team-list"></div>
                    </div>
                    <div>
                        <h4>✈️ ГОСТЕВАЯ КОМАНДА</h4>
                        <div id="away-list" class="team-list"></div>
                    </div>
                </div>
                
                <div style="margin: 15px 0;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="neutral-ground">
                        🏟️ Нейтральная площадка (отключить фактор дома)
                    </label>
                </div>
                
                <button onclick="calculatePrediction()">🎯 РАССЧИТАТЬ ФОРУ</button>
            </div>
            
            <!-- Результат -->
            <div id="result-section" style="display: none;">
                <div class="result" id="result-content"></div>
                <button class="btn-reset" onclick="resetCalculator()">🔄 Новая таблица</button>
            </div>
            
            <!-- Загрузка -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Парсинг таблицы...</p>
            </div>
        </div>
    </div>
    
    <script>
        let currentTeams = [];
        let selectedHome = null;
        let selectedAway = null;
        
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${isError ? 'status-error' : 'status-success'}`;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
        
        async function parseTable() {
            const url = document.getElementById('url-input').value.trim();
            
            if (!url) {
                showStatus('❌ Введите URL турнирной таблицы', true);
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('selection-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'none';
            
            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (data.success && data.teams && data.teams.length > 0) {
                    currentTeams = data.teams;
                    displayTeamSelection();
                    showStatus(`✅ Загружено ${data.teams.length} команд!`);
                } else {
                    showStatus(`❌ ${data.error || 'Не удалось распарсить таблицу'}`, true);
                }
            } catch (error) {
                console.error('Parse error:', error);
                showStatus(`❌ Ошибка: ${error.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayTeamSelection() {
            const homeDiv = document.getElementById('home-list');
            const awayDiv = document.getElementById('away-list');
            
            homeDiv.innerHTML = '';
            awayDiv.innerHTML = '';
            
            currentTeams.forEach(team => {
                const pointsInfo = team.points_won ? ` | Очки: ${team.points_won}:${team.points_lost}` : '';
                
                const homeItem = document.createElement('div');
                homeItem.className = 'team-item';
                homeItem.innerHTML = `
                    <div class="team-name">${escapeHtml(team.name)}</div>
                    <div class="team-stats">Сеты: ${team.sets_won}:${team.sets_lost}${pointsInfo}</div>
                `;
                homeItem.onclick = (function(name) {
                    return function() { selectTeam('home', name); };
                })(team.name);
                homeDiv.appendChild(homeItem);
                
                const awayItem = document.createElement('div');
                awayItem.className = 'team-item';
                awayItem.innerHTML = `
                    <div class="team-name">${escapeHtml(team.name)}</div>
                    <div class="team-stats">Сеты: ${team.sets_won}:${team.sets_lost}${pointsInfo}</div>
                `;
                awayItem.onclick = (function(name) {
                    return function() { selectTeam('away', name); };
                })(team.name);
                awayDiv.appendChild(awayItem);
            });
            
            document.getElementById('selection-section').style.display = 'block';
            selectedHome = null;
            selectedAway = null;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function selectTeam(type, teamName) {
            if (type === 'home') {
                selectedHome = teamName;
                document.querySelectorAll('#home-list .team-item').forEach(item => {
                    item.classList.remove('selected');
                    if (item.innerHTML.includes(escapeHtml(teamName))) {
                        item.classList.add('selected');
                    }
                });
            } else {
                selectedAway = teamName;
                document.querySelectorAll('#away-list .team-item').forEach(item => {
                    item.classList.remove('selected');
                    if (item.innerHTML.includes(escapeHtml(teamName))) {
                        item.classList.add('selected');
                    }
                });
            }
        }
        
        async function calculatePrediction() {
            if (!selectedHome || !selectedAway) {
                showStatus('❌ Выберите обе команды', true);
                return;
            }
            
            if (selectedHome === selectedAway) {
                showStatus('❌ Выберите разные команды', true);
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        teams: currentTeams,
                        home_team: selectedHome,
                        away_team: selectedAway,
                        neutral_ground: document.getElementById('neutral-ground').checked
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResult(data.prediction);
                } else {
                    showStatus(`❌ ${data.error}`, true);
                }
            } catch (error) {
                console.error('Calculate error:', error);
                showStatus(`❌ Ошибка: ${error.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayResult(p) {
            const pointsInfo = p.home_points ? 
                `<div class="stats-row">
                    <span>📊 ${p.home_team}: сеты ${p.home_sets} | очки ${p.home_points}</span>
                    <span>⚡ ${p.away_team}: сеты ${p.away_sets} | очки ${p.away_points}</span>
                </div>` :
                `<div class="stats-row">
                    <span>📊 ${p.home_team}: сеты ${p.home_sets}</span>
                    <span>⚡ ${p.away_team}: сеты ${p.away_sets}</span>
                </div>`;
            
            document.getElementById('result-content').innerHTML = `
                <div class="result-header">
                    <h2>${escapeHtml(p.home_team)} 🆚 ${escapeHtml(p.away_team)}</h2>
                </div>
                ${pointsInfo}
                
                <div class="handicap-card">
                    <div class="handicap-label">🎯 ИТОГОВЫЙ ПРОГНОЗ - ФОРА ПО МЯЧАМ</div>
                    <div class="handicap-line">${p.handicap_line}</div>
                    <div class="handicap-odds">${p.handicap_odds}</div>
                    <div class="handicap-text">${p.handicap_text}</div>
                </div>
                
                <div class="odds-row">
                    <div class="odds-card">
                        <div class="odds-label">ПОБЕДА ${p.home_team}</div>
                        <div class="odds-value">${p.home_win_odds}</div>
                    </div>
                    <div class="odds-card">
                        <div class="odds-label">ПОБЕДА ${p.away_team}</div>
                        <div class="odds-value">${p.away_win_odds}</div>
                    </div>
                </div>
                
                <div style="font-size: 11px; text-align: center; opacity: 0.6; margin-top: 15px;">
                    ⚡ Прогноз основан только на статистике | Не учитывает составы и травмы
                </div>
            `;
            
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('selection-section').style.display = 'none';
            document.getElementById('result-content').scrollIntoView({ behavior: 'smooth' });
        }
        
        function resetCalculator() {
            currentTeams = [];
            selectedHome = null;
            selectedAway = null;
            document.getElementById('selection-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('url-input').value = '';
            document.getElementById('status').style.display = 'none';
        }
    </script>
</body>
</html>
