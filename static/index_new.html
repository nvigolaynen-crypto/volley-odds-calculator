<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Volley Odds Calculator - Только фора</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover { background: #45a049; }
        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .team-list {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .team-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #ddd;
        }
        .team-item:hover { background: #667eea; color: white; }
        .team-item.selected { background: #4CAF50; color: white; }
        .vs { text-align: center; font-size: 20px; margin: 10px 0; }
        .result {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
        .handicap { font-size: 28px; font-weight: bold; margin: 15px 0; }
        .odds { font-size: 36px; font-weight: bold; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-success { background: #d4edda; color: #155724; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .help { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏐 Volley Odds Calculator</h1>
        <p>Вставьте ссылку на турнирную таблицу</p>
        
        <input type="text" id="url" placeholder="https://...">
        <button onclick="parseTable()">Парсить таблицу</button>
        <div class="help">Поддерживаются сайты с HTML-таблицами (DataProject, LegaVolley и др.)</div>
        
        <div id="status" class="status"></div>
        <div class="loading" id="loading"><div class="spinner"></div><p>Парсинг...</p></div>
        
        <div id="teams-section" style="display:none;">
            <div class="teams-grid">
                <div>
                    <h4>🏠 Домашняя команда</h4>
                    <div id="home-list" class="team-list"></div>
                </div>
                <div>
                    <h4>✈️ Гостевая команда</h4>
                    <div id="away-list" class="team-list"></div>
                </div>
            </div>
            <button onclick="calculate()">🎯 Рассчитать фору по мячам</button>
        </div>
        
        <div id="result-section" style="display:none;">
            <div class="result" id="result"></div>
            <button onclick="resetCalc()" style="margin-top:15px;">🔄 Новая таблица</button>
        </div>
    </div>
    
    <script>
        let teamsData = [];
        let selectedHome = null;
        let selectedAway = null;
        
        function showStatus(msg, isError) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${isError ? 'status-error' : 'status-success'}`;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }
        
        async function parseTable() {
            const url = document.getElementById('url').value;
            if (!url) { showStatus('Введите URL', true); return; }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                const res = await fetch('/api/parse', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();
                
                if (data.success && data.teams.length > 0) {
                    teamsData = data.teams;
                    showStatus(`✅ Загружено ${data.teams.length} команд`);
                    displayTeams();
                } else {
                    showStatus(`❌ ${data.error || 'Ошибка'}`, true);
                }
            } catch(e) {
                showStatus(`❌ ${e.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayTeams() {
            const homeDiv = document.getElementById('home-list');
            const awayDiv = document.getElementById('away-list');
            homeDiv.innerHTML = '';
            awayDiv.innerHTML = '';
            
            teamsData.forEach(team => {
                const div1 = document.createElement('div');
                div1.className = 'team-item';
                div1.textContent = `${team.name} (Сеты: ${team.sets_won}:${team.sets_lost})`;
                div1.onclick = (function(name) { return function() { selectTeam('home', name); }; })(team.name);
                homeDiv.appendChild(div1);
                
                const div2 = document.createElement('div');
                div2.className = 'team-item';
                div2.textContent = `${team.name} (Сеты: ${team.sets_won}:${team.sets_lost})`;
                div2.onclick = (function(name) { return function() { selectTeam('away', name); }; })(team.name);
                awayDiv.appendChild(div2);
            });
            
            document.getElementById('teams-section').style.display = 'block';
            selectedHome = null;
            selectedAway = null;
        }
        
        function selectTeam(type, name) {
            if (type === 'home') {
                selectedHome = name;
                document.querySelectorAll('#home-list .team-item').forEach(el => {
                    el.classList.remove('selected');
                    if (el.textContent.includes(name)) el.classList.add('selected');
                });
            } else {
                selectedAway = name;
                document.querySelectorAll('#away-list .team-item').forEach(el => {
                    el.classList.remove('selected');
                    if (el.textContent.includes(name)) el.classList.add('selected');
                });
            }
        }
        
        async function calculate() {
            if (!selectedHome || !selectedAway) {
                showStatus('Выберите обе команды', true);
                return;
            }
            if (selectedHome === selectedAway) {
                showStatus('Выберите разные команды', true);
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                const res = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        teams: teamsData,
                        home_team: selectedHome,
                        away_team: selectedAway
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    const p = data.prediction;
                    document.getElementById('result').innerHTML = `
                        <div style="margin-bottom:15px;">📊 ${p.home_team} (${p.home_sets}) vs ${p.away_team} (${p.away_sets})</div>
                        <div>🎯 ФОРА ПО МЯЧАМ</div>
                        <div class="handicap">${p.handicap_line}</div>
                        <div class="odds">${p.handicap_odds}</div>
                        <div style="font-size:12px; margin-top:10px;">${p.handicap_text}</div>
                        <hr style="margin:15px 0; opacity:0.3;">
                        <div style="font-size:12px;">Победа ${p.home_team}: ${p.home_win_odds} | Победа ${p.away_team}: ${p.away_win_odds}</div>
                    `;
                    document.getElementById('result-section').style.display = 'block';
                    document.getElementById('teams-section').style.display = 'none';
                }
            } catch(e) {
                showStatus(`Ошибка: ${e.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function resetCalc() {
            teamsData = [];
            selectedHome = null;
            selectedAway = null;
            document.getElementById('teams-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('url').value = '';
        }
    </script>
</body>
</html>
